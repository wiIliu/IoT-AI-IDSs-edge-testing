<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results • CSI4999 IDS in IoT</title>
  <link rel="stylesheet" href="static/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">CSI4999 • Results & Comparison</h1>
      <nav class="nav top-nav">
        <a href="index.html">Home</a>
        <a href="methodology.html">Methodology</a>
        <a href="future-work.html">Future Work</a>
        <a href="challenges.html">Challenges</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <section class="hero">
      <p class="muted">This page auto‑loads metrics from <code>results.json</code> located next to this file.</p>
      <div id="results-table" class="card"></div>
      <div class="card">
        <h3>Key Takeaways</h3>
        <ul id="key-takeaways"></ul>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container"><p>CSI4999 • Oakland University</p></div>
  </footer>
  <script>
    async function loadResults(){
      try{
        const res = await fetch('results.json', {cache:'no-store'});
        if(!res.ok) throw new Error('No results.json');
        const data = await res.json();
        renderResults(data);
      }catch(e){
        document.getElementById('results-table').innerHTML = '<p class="muted">results.json is missing. Add it to this folder to populate metrics.</p>';
      }
    }
    function renderResults(data){
      const tbl = document.getElementById('results-table');
      const metrics = data.metrics||[];
      const cols = ['model','accuracy','precision','recall','f1','roc_auc'];
      if(!metrics.length){ tbl.innerHTML = '<p class="muted">No metrics found in results.json</p>'; return; }
      const thead = `<thead><tr>${cols.map(c=>`<th>${c.replace('_',' ').toUpperCase()}</th>`).join('')}</tr></thead>`;
      const rows = metrics.map(m=>`<tr>${cols.map(c=>`<td>${m[c] ?? ''}</td>`).join('')}</tr>`).join('');
      tbl.innerHTML = `<table class="kv">${thead}<tbody>${rows}</tbody></table>`;
      const kt = document.getElementById('key-takeaways');
      kt.innerHTML = (data.takeaways||[]).map(t=>`<li>${t}</li>`).join('');
    }
    loadResults();
  </script>
</body>
</html>
